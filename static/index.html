<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Lumix Chat</title>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #1e1f22;
    color: white;
    display: flex;
    height: 100vh;
}

/* sidebar */
.sidebar {
    width: 240px;
    background: #2b2d31;
    padding: 10px;
}

/* chat */
.chat {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.messages {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
}

.msg {
    background: #313338;
    margin: 6px 0;
    padding: 10px;
    border-radius: 8px;
}

.input {
    display: flex;
    padding: 10px;
    background: #2b2d31;
}

input {
    flex: 1;
    padding: 10px;
    border: none;
    background: #1e1f22;
    color: white;
}

button {
    margin-left: 10px;
    background: #5865f2;
    color: white;
    border: none;
    padding: 10px;
}

.online {
    font-size: 12px;
    color: #aaa;
}
</style>
</head>

<body>

<div class="sidebar">
<h3>Rooms</h3>
<button onclick="joinRoom('general')"># general</button>
<button onclick="joinRoom('games')"># games</button>

<hr>
<div id="online"></div>
</div>

<div class="chat">
<div class="messages" id="messages"></div>

<div class="input">
<input id="text" placeholder="Сообщение...">
<button onclick="send()">➤</button>
</div>
</div>

<script>
const socket = io();

let username = prompt("Введите ник:");
let currentRoom = "general";

socket.emit("join", {
    room: currentRoom,
    username: username
});

function joinRoom(room) {
    currentRoom = room;
    document.getElementById("messages").innerHTML = "";

    socket.emit("join", {
        room: room,
        username: username
    });
}

function send() {
    const input = document.getElementById("text");
    if (!input.value.trim()) return;

    socket.emit("message", {
        room: currentRoom,
        username: username,
        text: input.value
    });

    input.value = "";
}

socket.on("message", (data) => {
    if (data.room !== currentRoom) return;

    const div = document.createElement("div");
    div.className = "msg";
    div.innerHTML = `<b>${data.username}</b>: ${data.text}`;

    document.getElementById("messages").appendChild(div);
});

socket.on("online", (users) => {
    document.getElementById("online").innerHTML =
        "<b>Online:</b><br>" + users.join("<br>");
});
</script>

</body>
  </html>
