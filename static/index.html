<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lumix V3</title>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<style>
body {
    margin: 0;
    display: flex;
    height: 100vh;
    font-family: Arial;
    background: #1e1f22;
    color: white;
}

/* SIDEBAR */
.sidebar {
    width: 240px;
    background: #2b2d31;
    padding: 10px;
}

/* CHAT */
.chat {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.messages {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
}

.msg {
    background: #313338;
    margin: 5px;
    padding: 8px;
    border-radius: 8px;
}

/* INPUT */
.input {
    display: flex;
    padding: 10px;
    background: #2b2d31;
}

input {
    flex: 1;
    padding: 10px;
    border: none;
    background: #1e1f22;
    color: white;
}

button {
    margin-left: 10px;
    background: #5865f2;
    border: none;
    color: white;
    padding: 10px;
}

/* USERS */
.users {
    font-size: 12px;
    color: #aaa;
}
</style>
</head>

<body>

<div class="sidebar">
<h3>Rooms</h3>
<button onclick="join('general')"># general</button>
<button onclick="join('dev')"># dev</button>

<hr>

<div id="users"></div>
</div>

<div class="chat">
<div class="messages" id="messages"></div>

<div class="input">
<input id="text">
<button onclick="send()">➤</button>
</div>
</div>

<script>
const socket = io();

let token = localStorage.getItem("token");
let room = "general";

if (!token) {
    token = prompt("username:");
    fetch("/login", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({username: token})
    })
    .then(r=>r.json())
    .then(d=>{
        localStorage.setItem("token", d.token);
        socket.emit("auth", {token:d.token});
    });
} else {
    socket.emit("auth", {token});
}

socket.on("message", m => {
    if (m.room !== room) return;

    let div = document.createElement("div");
    div.className = "msg";
    div.innerHTML = `
        <b>${m.user}</b>: ${m.text}
        <button onclick="del(${m.id})">x</button>
        <button onclick="edit(${m.id})">edit</button>
    `;
    messages.appendChild(div);
});

function send(){
    socket.emit("message", {
        room,
        text: text.value
    });
    text.value="";
}

function join(r){
    room = r;
    messages.innerHTML="";
    socket.emit("join",{room});
}

function del(id){
    socket.emit("delete",{room,id});
}

function edit(id){
    let t = prompt("new text");
    socket.emit("edit",{room,id,text:t});
}

socket.on("online", u=>{
    users.innerHTML = "<b>online:</b><br>"+u.join("<br>");
});
</script>

</body>
</html>
