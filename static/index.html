<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Lumix V7</title>

<style>
body {
    margin:0;
    font-family: Arial;
    display:flex;
    height:100vh;
    background:#1e1f22;
    color:white;
}

/* LEFT PANEL */
#left {
    width:250px;
    background:#2b2d31;
    padding:10px;
}

/* ROOMS */
.room {
    padding:10px;
    cursor:pointer;
    border-radius:6px;
}
.room:hover { background:#404249; }

/* DM USERS */
.user {
    padding:6px;
    font-size:13px;
    cursor:pointer;
    color:#aaa;
}
.user:hover { color:white; }

/* CHAT */
#chatbox {
    flex:1;
    display:flex;
    flex-direction:column;
}

#chat {
    flex:1;
    overflow-y:auto;
    padding:10px;
}

.msg {
    background:#2b2d31;
    margin:5px;
    padding:10px;
    border-radius:8px;
}

.me { background:#5865f2; }

/* INPUT */
#bar {
    display:flex;
    padding:10px;
    background:#2b2d31;
}

input {
    flex:1;
    padding:10px;
    border:none;
    border-radius:6px;
}

button {
    margin-left:10px;
    background:#5865f2;
    border:none;
    color:white;
    padding:10px;
    border-radius:6px;
}
</style>
</head>

<body>

<div id="left">
    <b>Rooms</b>
    <div class="room" onclick="join('general')"># general</div>
    <div class="room" onclick="join('games')"># games</div>

    <hr>

    <b>Users</b>
    <div id="users"></div>
</div>

<div id="chatbox">
    <div id="chat"></div>

    <div id="bar">
        <input id="input">
        <button onclick="send()">➤</button>
    </div>
</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>
const socket = io();

let token = localStorage.getItem("token");
let name = localStorage.getItem("name");

if (!token) {
    let mode = prompt("login/register");
    let n = prompt("name");
    let p = prompt("password");

    socket.emit(mode, {name:n, password:p});
}

socket.on("auth", (res) => {
    if (!res.ok) {
        alert("auth failed");
        location.reload();
    } else {
        token = res.token;
        name = res.name;

        localStorage.setItem("token", token);
        localStorage.setItem("name", name);

        join("general");
    }
});

let room = "general";

function join(r) {
    room = r;
    document.getElementById("chat").innerHTML = "";
    socket.emit("join", {room});
}

socket.on("history", (msgs) => msgs.forEach(add));
socket.on("message", add);

socket.on("online", (users) => {
    document.getElementById("users").innerHTML =
        users.map(u => `<div class="user">🟢 ${u}</div>`).join("");
});

function add(m) {
    const div = document.createElement("div");
    div.className = "msg " + (m.name === name ? "me" : "");
    div.innerHTML = `<b>${m.name}</b><br>${m.text}`;
    document.getElementById("chat").appendChild(div);
    document.getElementById("chat").scrollTop = 999999;
}

function send() {
    let i = document.getElementById("input");
    if (!i.value) return;

    socket.emit("message", {
        room,
        name,
        text: i.value
    });

    i.value = "";
}

join("general");
</script>

</body>
</html>
