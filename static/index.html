<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Lumix V4</title>

<style>
body {
    margin:0;
    font-family: Arial;
    display:flex;
    height:100vh;
    background:#1e1f22;
    color:white;
}

/* SIDEBAR */
#rooms {
    width:200px;
    background:#2b2d31;
    padding:10px;
}

.room {
    padding:10px;
    cursor:pointer;
    border-radius:6px;
}

.room:hover {
    background:#404249;
}

/* CHAT */
#chat-box {
    flex:1;
    display:flex;
    flex-direction:column;
}

#chat {
    flex:1;
    overflow-y:auto;
    padding:10px;
}

.msg {
    background:#2b2d31;
    margin:5px;
    padding:10px;
    border-radius:8px;
}

.me {
    background:#5865f2;
}

/* INPUT */
#input-area {
    display:flex;
    padding:10px;
    background:#2b2d31;
}

input {
    flex:1;
    padding:10px;
    border:none;
    border-radius:6px;
}

button {
    margin-left:10px;
    background:#5865f2;
    border:none;
    color:white;
    padding:10px;
    border-radius:6px;
}
</style>
</head>

<body>

<div id="rooms">
    <div class="room" onclick="joinRoom('general')"># general</div>
    <div class="room" onclick="joinRoom('games')"># games</div>
</div>

<div id="chat-box">
    <div id="chat"></div>

    <div id="input-area">
        <input id="input" placeholder="сообщение...">
        <button onclick="sendMsg()">➤</button>
    </div>
</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>
const socket = io();

let name = prompt("Имя?") || "anon";
let room = "general";

function joinRoom(r) {
    room = r;
    document.getElementById("chat").innerHTML = "";
    socket.emit("join", {room: room});
}

socket.on("history", (msgs) => {
    msgs.forEach(addMsg);
});

socket.on("message", (data) => {
    addMsg(data);
});

function addMsg(data) {
    const div = document.createElement("div");
    div.className = "msg " + (data.name === name ? "me" : "");
    div.innerHTML = `<b>${data.name}</b><br>${data.text}`;
    document.getElementById("chat").appendChild(div);
    document.getElementById("chat").scrollTop = 999999;
}

function sendMsg() {
    const input = document.getElementById("input");
    if (!input.value) return;

    socket.emit("message", {
        room: room,
        name: name,
        text: input.value
    });

    input.value = "";
}

joinRoom("general");
</script>

</body>
</html>
